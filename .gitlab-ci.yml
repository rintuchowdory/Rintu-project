image: node:18

stages:
  - install
  - lint
  - test
  - build
  - deploy

cache:
  paths:
    - node_modules/

variables:
  CI: 'true'

before_script:
  - node --version
  - npm --version

install_dependencies:
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
  cache:
    policy: push

lint:
  stage: lint
  script:
    - npm run lint
  only:
    - merge_requests
    - main

test:
  stage: test
  script:
    - npm test
  only:
    - merge_requests
    - main

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - main
  cache:
    policy: pull

pages:
  stage: deploy
  script:
    - npm run build
    - mv dist public
  artifacts:
    paths:
      - public
  only:
    - main

# Review app (optional)
review:
  stage: deploy
  script:
    - echo "Deploying review app..."
    - npm run build
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    url: https://$CI_ENVIRONMENT_SLUG.example.com
    on_stop: stop_review
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: manual
  cache:
    policy: pull

stop_review:
  stage: cleanup  # or whatever stage comes after 'review'
  script:
    - echo "Stopping review environment"
    # Add your cleanup commands here
  when: manual
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs: ["review"]  # Link to your review job
  environment:
    name: review/$CI_COMMIT_REF_NAME
    action: stop