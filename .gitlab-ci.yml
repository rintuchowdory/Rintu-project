# .gitlab-ci.yml
# GitLab CI/CD Configuration File - Copy Mode

# Define stages in order of execution
stages:
  - build
  - test
  - deploy
  - review
  - cleanup

# Variables available to all jobs
variables:
  APP_NAME: "my-app"
  DOCKER_REGISTRY: "registry.example.com"
  ENVIRONMENT: "production"

# Cache configuration
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - node_modules/
    - .gradle/
    - vendor/bundle
  policy: pull-push

# Before script runs before each job (unless overridden)
before_script:
  - echo "Starting job for ${CI_PROJECT_NAME}"
  - export COMMIT_SHA_SHORT=${CI_COMMIT_SHORT_SHA}

# After script runs after each job (unless overridden)
after_script:
  - echo "Job ${CI_JOB_NAME} completed"

########################################
# BUILD STAGE
########################################

build:
  stage: build
  image: maven:3.8-openjdk-17
  script:
    - echo "Building application..."
    - mvn clean package
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop" || $CI_PIPELINE_SOURCE == "merge_request_event"'

########################################
# TEST STAGE
########################################

unit-test:
  stage: test
  image: maven:3.8-openjdk-17
  script:
    - echo "Running unit tests..."
    - mvn test
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml
  needs: ["build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop" || $CI_PIPELINE_SOURCE == "merge_request_event"'

integration-test:
  stage: test
  image: maven:3.8-openjdk-17
  script:
    - echo "Running integration tests..."
    - mvn verify -DskipUnitTests
  needs: ["build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
  when: manual

########################################
# DEPLOY STAGE
########################################

deploy-prod:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to production..."
    - apk add --no-cache curl
    - curl -X POST https://api.example.com/deploy --data "commit=${CI_COMMIT_SHA}"
  environment:
    name: production
    url: https://myapp.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  when: manual

deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging..."
    - ./scripts/deploy.sh staging
  environment:
    name: staging
    url: https://staging.myapp.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

########################################
# REVIEW STAGE (Environment per MR)
########################################

review:
  stage: review
  image: alpine:latest
  script:
    - echo "Deploying review app for MR ${CI_MERGE_REQUEST_IID}"
    - echo "Application URL: https://review-${CI_MERGE_REQUEST_IID}.example.com"
    - ./scripts/deploy_review.sh
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: https://review-${CI_MERGE_REQUEST_IID}.example.com
    on_stop: stop_review
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never

stop_review:
  stage: cleanup
  image: alpine:latest
  script:
    - echo "Cleaning up review environment for MR ${CI_MERGE_REQUEST_IID}"
    - ./scripts/cleanup_review.sh
  environment:
    name: review/$CI_COMMIT_REF_NAME
    action: stop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - when: never
  needs: ["review"]

########################################
# CLEANUP STAGE
########################################

cleanup:
  stage: cleanup
  script:
    - echo "Cleaning up temporary files..."
    - rm -rf tmp/
  when: always

########################################
# SECURITY SCANNING (Optional)
########################################

sast:
  stage: test
  image: gitlab/gitlab-owasp-zap:latest
  variables:
    SAST_EXCLUDED_PATHS: "spec, test, tests, tmp"
  script:
    - zap-baseline.py -t https://example.com
  artifacts:
    reports:
      sast: gl-sast-report.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"'

########################################
# NOTIFICATIONS
########################################

notify-success:
  stage: cleanup
  script:
    - echo "Pipeline succeeded! Sending notification..."
    - curl -X POST https://api.slack.com/webhook -d '{"text":"Pipeline succeeded!"}'
  when: on_success

notify-failure:
  stage: cleanup
  script:
    - echo "Pipeline failed! Sending notification..."
    - curl -X POST https://api.slack.com/webhook -d '{"text":"Pipeline failed!"}'
  when: on_failure

########################################
# WORKFLOW RULES (Control when pipeline runs)
########################################

workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /skip-ci/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - when: never
